{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<div class="row pt-4 mb-4 animate-slide-up">
    <div class="col-12 text-center">
        <h2 class="text-dark fw-bold m-0"><i class="fa-solid fa-map-location-dot text-primary me-2"></i>Live City Map</h2>
        <p class="text-muted mt-1 mb-0">Explore reports and incidents actively tracked across the city.</p>
    </div>
</div>

<div class="row mb-5 animate-slide-up" style="animation-delay: 0.1s;">
    <div class="col-12">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden position-relative">
            <div id="cityMap" style="height: 600px; width: 100%; z-index: 1;"></div>
            
            <!-- Floating overlay for map stats -->
            <div class="position-absolute top-0 end-0 m-3 z-3 bg-white p-3 rounded-4 shadow-lg border border-light" style="width: 200px;">
                <h6 class="fw-bold text-dark border-bottom pb-2 mb-2"><i class="fa-solid fa-chart-pie me-1 text-primary"></i> Map Stats</h6>
                <div class="d-flex justify-content-between mb-1 small">
                    <span class="text-muted">Mapped Issues:</span>
                    <span class="fw-bold text-dark" id="mapTotal">0</span>
                </div>
                <div class="d-flex justify-content-between mb-1 small">
                    <span class="text-muted"><i class="fa-solid fa-circle text-danger me-1"></i>Pending:</span>
                    <span class="fw-bold text-dark" id="mapPending">0</span>
                </div>
                <div class="d-flex justify-content-between small">
                    <span class="text-muted"><i class="fa-solid fa-circle text-success me-1"></i>Resolved:</span>
                    <span class="fw-bold text-dark" id="mapResolved">0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Initialize map centered roughly on the US, will zoom to fit bounds later
    var map = L.map('cityMap').setView([39.8283, -98.5795], 4);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // Custom icons
    var pendingIcon = L.divIcon({
        className: 'custom-div-icon',
        html: "<div style='background-color:#ef4444; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);'></div>",
        iconSize: [20, 20],
        iconAnchor: [10, 10]
    });
    
    var resolvedIcon = L.divIcon({
        className: 'custom-div-icon',
        html: "<div style='background-color:#10b981; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);'></div>",
        iconSize: [20, 20],
        iconAnchor: [10, 10]
    });

    var bounds = [];
    var mappedCount = 0;
    var pendCount = 0;
    var resCount = 0;

    fetch("/all_reports")
    .then(res => res.json())
    .then(data => {
        data.forEach(r => {
            // r: [id, description, location, category, status, email, upvotes]
            let locStr = r[2];
            // Attempt to parse lat, lon
            let parts = locStr.replace("Lat: ", "").replace("Lon: ", "").split(",");
            if(parts.length === 2) {
                let lat = parseFloat(parts[0].trim());
                let lon = parseFloat(parts[1].trim());
                
                if(!isNaN(lat) && !isNaN(lon)) {
                    mappedCount++;
                    let isResolved = (r[4] === "Resolved");
                    if(isResolved) resCount++; else pendCount++;
                    
                    let icon = isResolved ? resolvedIcon : pendingIcon;
                    
                    let popupHtml = `
                        <div class="text-center p-2" style="min-width: 150px;">
                            <span class="badge ${isResolved ? 'bg-success' : 'bg-danger'} mb-2">${r[4]}</span>
                            <h6 class="fw-bold text-dark mb-1">${r[3]}</h6>
                            <p class="small text-muted mb-2 text-truncate" style="max-width: 200px;">${r[1]}</p>
                            <a href="/track?id=${r[0]}" class="btn btn-sm btn-outline-primary rounded-pill w-100">View</a>
                        </div>
                    `;
                    
                    let marker = L.marker([lat, lon], {icon: icon}).addTo(map);
                    marker.bindPopup(popupHtml);
                    bounds.push([lat, lon]);
                }
            }
        });
        
        document.getElementById("mapTotal").innerText = mappedCount;
        document.getElementById("mapPending").innerText = pendCount;
        document.getElementById("mapResolved").innerText = resCount;

        if(bounds.length > 0) {
            map.fitBounds(bounds, {padding: [50, 50]});
        }
    });
});
</script>
<style>
@keyframes slideUpFade {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
.z-3 { z-index: 1000 !important; }
</style>
{% endblock %}
